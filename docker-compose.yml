services:

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: leetcode_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: leetcode-analyzer
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: leetcode_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ── ML Service (FastAPI) ───────────────────────────────────────────────────
  ml-service:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    container_name: leetcode_ml
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      ALLOWED_ORIGINS: "http://backend:5001,http://localhost:5001"

  # ── Backend (Node.js / Express) ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leetcode_backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/leetcode-analyzer
      REDIS_URL: redis://redis:6379
      CACHE_TTL_SECONDS: 3600
      FRONTEND_URL: "http://localhost:3000"
      ML_SERVICE_URL: http://ml-service:8000
      ML_TIMEOUT_MS: 5000
    depends_on:
      - mongodb
      - redis
      - ml-service

  # ── Frontend (React / nginx) ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: leetcode_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
  redis_data:
